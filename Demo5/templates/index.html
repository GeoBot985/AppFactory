<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Demo5: Passive Watcher Chat</title>
    <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
    <div class="container">
        <div class="main-panel">
            <header>
                <h1>Passive Watcher Chat</h1>
                <div class="controls">
                    <label for="model-select">Model:</label>
                    <select id="model-select">
                        <option value="">Loading models...</option>
                    </select>
                </div>
                <div id="status-area" class="status-area"></div>
            </header>

            <div class="ingest-panel">
                <div class="ingest-controls">
                    <input type="file" id="pdf-file-input" accept=".pdf" style="display: none;">
                    <button id="browse-pdf-btn">Browse PDF</button>
                    <span id="selected-pdf-path">No PDF selected.</span>
                    <button id="ingest-pdf-btn" disabled>Ingest PDF</button>
                </div>
                <div id="ingest-status-area" class="ingest-status-area">Ready</div>
                <div class="indexed-docs-area">
                    <strong>Indexed docs:</strong>
                    <ul id="indexed-docs-list">
                        <li>None</li>
                    </ul>
                </div>
            </div>

            <div id="chat-area" class="chat-area">
                <!-- Chat messages will appear here -->
            </div>

            <div class="input-area">
                <textarea id="message-input" placeholder="Type your message here..." rows="3"></textarea>
                <button id="send-btn">Send</button>
            </div>
        </div>

        <div class="debug-panel">
            <h2>Debug Trace</h2>
            <pre id="debug-output">No request yet.</pre>
        </div>
    </div>

    <script src="/static/app.js"></script>
</body>
</html>
