<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NovaCalc</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="calculator">
        <div class="display">
            <div class="expression"></div>
            <div class="result">0</div>
        </div>
        <div class="buttons-container">
            <div class="scientific-buttons">
                <button class="operator">sin</button>
                <button class="operator">cos</button>
                <button class="operator">tan</button>
                <button class="operator">log</button>
                <button class="operator">ln</button>
                <button class="operator">√</button>
                <button class="operator">x^y</button>
                <button class="operator">n!</button>
                <button class="operator">M+</button>
                <button class="operator">M-</button>
                <button class="operator">MR</button>
                <button class="operator">MC</button>
            </div>
            <div class="numeric-buttons">
                <button class="operator">C</button>
                <button class="operator">CE</button>
                <button class="operator">%</button>
                <button class="operator">/</button>
                <button>7</button>
                <button>8</button>
                <button>9</button>
                <button class="operator">*</button>
                <button>4</button>
                <button>5</button>
                <button>6</button>
                <button class="operator">-</button>
                <button>1</button>
                <button>2</button>
                <button>3</button>
                <button class="operator">+</button>
                <button class="zero">0</button>
                <button>.</button>
                <button class="operator">=</button>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
