<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Demo5: Passive Watcher Chat</title>
    <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
    <div class="container">
        <div class="main-panel">
            <header>
                <h1>Passive Watcher Chat</h1>
                <div class="controls">
                    <label for="model-select">Model:</label>
                    <select id="model-select">
                        <option value="">Loading models...</option>
                    </select>
                </div>
                <div id="status-area" class="status-area"></div>
            </header>

            <div class="ingest-panel">
                <div class="ingest-controls">
                    <input type="file" id="pdf-file-input" accept=".pdf" multiple style="display: none;">
                    <button id="browse-pdf-btn">Browse PDF</button>
                    <div id="selected-files-container" class="selected-files-container">
                        <span id="selected-pdf-path">No PDF selected.</span>
                    </div>
                    <button id="ingest-pdf-btn" disabled>Ingest Selected Files</button>
                </div>
                <div id="ingest-status-area" class="ingest-status-area">Ready</div>
                <div id="batch-results-area" class="batch-results-area" style="display: none;">
                    <!-- Batch ingestion results will appear here -->
                </div>
            </div>

            <div class="corpus-panel">
                <div class="corpus-header">
                    <h2>Corpus</h2>
                    <div class="corpus-controls">
                        <button id="refresh-corpus-btn">Refresh</button>
                        <button id="select-all-btn">Select All</button>
                        <button id="clear-selection-btn">Clear Selection</button>
                        <button id="remove-selected-btn" class="danger" disabled>Remove Selected</button>
                    </div>
                </div>

                <div class="corpus-stats" id="corpus-stats">
                    <div class="stat-item">Docs: <span id="stat-docs">0</span></div>
                    <div class="stat-item">Chunks: <span id="stat-chunks">0</span></div>
                    <div class="stat-item">Selected: <span id="stat-selected">0</span></div>
                    <div class="stat-item">Last Ingest: <span id="stat-last-ingest">N/A</span></div>
                </div>

                <div class="corpus-scope-status">
                    Retrieval scope: <span id="retrieval-scope-text">Full corpus</span>
                </div>

                <div id="corpus-list" class="corpus-list">
                    <div class="empty-corpus-msg">No indexed documents.</div>
                </div>
            </div>

            <div class="corpus-management">
                <label>
                    <input type="checkbox" id="clear-confirm-check"> Enable Clear Corpus
                </label>
                <button id="clear-corpus-btn" class="danger" disabled>Clear Corpus</button>
            </div>

            <div class="chat-evidence-wrapper">
                <div id="chat-area" class="chat-area">
                    <!-- Chat messages will appear here -->
                </div>

                <div class="evidence-panel">
                    <h3>Evidence</h3>
                    <div id="evidence-output" class="evidence-output">
                        <div class="empty-evidence-msg">No evidence yet.</div>
                    </div>
                </div>
            </div>

            <div class="input-area">
                <textarea id="message-input" placeholder="Type your message here..." rows="3"></textarea>
                <button id="send-btn">Send</button>
            </div>
        </div>

        <div class="debug-panel">
            <h2>Debug Trace</h2>
            <pre id="debug-output">No request yet.</pre>
        </div>
    </div>

    <script src="/static/app.js"></script>
</body>
</html>
